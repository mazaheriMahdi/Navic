name: "🐞 Bug Report"
description: Report an issue in the app
labels: ["bug"]
body:
  - type: textarea
    id: bug-explanation
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is
    validations:
      required: true

  - type: textarea
    id: bug-expected
    attributes:
      label: Expected behaviour
      description: A clear and concise description of what you expected to happen
    validations:
      required: true

  - type: textarea
    id: reproducing
    attributes:
      label: Reproducing
      description: Steps to reproduce the behavior
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Any screenshots of this issue, if applicable
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS Version
      placeholder: Android 16, iOS 18...
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App Version
      placeholder: eg. 1.0.0-alpha20
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Prerequisites
      options:
        - label: "I've checked existing issues to see if this already was reported"
          required: true
        - label: "I've ensured I am on the LATEST app version in case this was already fixed recently"
          required: true
